<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="Assets/login.webp" class="">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode:'class',
            theme: {
                extend: {
                    colors:{
                        dark1:'#1e1e1e',
                        dark2:'#252526',
                        dark3:'#2d2d30',
                        dark4:'#3e3e42',
                        dark5:'#d1d5db',
                        1:'#3952b4',
                        2:'#5E7AC4',
                        3:'#F3BE7A',
                        4:'#F08D39',
                    }
                },
            },
        }
    </script>
</head>
<body>
    <div class="fixed w-full flex items-center justify-end mt-16 mr-16">
        <button id="theme" class="bg-dark5 dark:bg-white p-2 flex items-center justify-center gap-2 hover:bg-gray-500 dark:hover:bg-dark5- rounded-full">
            <img id="dark" src="Assets/dark mode.webp" alt="moon" class="w-8 h-8">
            <img id="light" src="Assets/light mode.webp" alt="sun" class="w-8 h-8 hidden">
        </button>
    </div>
    <section class="min-h-screen flex flex-row">  
        <div class="flex-1 bg-2 flex flex-col items-center justify-center dark:bg-dark2">
            <div class="h-auto text-white flex flex-col items-center justify-center px-20">
                <h1 class="text-6xl font-bold">Hello Prospective Student</h1>
                <img src="Assets/gambar_login page.png" alt="" class="w-96 h-auto">
                <h3 class="text-lg font-semibold">Unlock your professional potential. Learn from industry leaders and stay ahead of the competition.</h3>
            </div>
        </div>
        <div class="flex-1 bg-blue-50 flex flex-col items-center justify-center dark:bg-dark4">
            <div class="h-auto flex flex-col items-center justify-center px-20">
                <div class="flex flex-col text-center gap-2 mb-8">
                    <h2 class="text-black text-xl font-semibold dark:text-white">LOGIN PAGE</h2>
                    <p class="text-gray-500 text-sm">Masukkan Username dan Password Anda</p>
                </div>
                <form class="space-y-4">
                    <div>
                        <input type="email" name="email" 
                        id="email" class="w-full px-6 py-2 bg-white text-black text-center rounded-lg placeholder-1 placeholder:font-semibold shadow-md" 
                        placeholder="Email Addres">
                        <span id="emailError" class="text-red-600 text-xs mt-1 hidden"></span>
                    </div>
                    <div>
                        <input type="password" name="password" 
                        id="password" class="w-full px-6 py-2 bg-white text-black text-center rounded-lg placeholder-1 placeholder:font-semibold shadow-md" 
                        placeholder="Password">
                        <span id="passError" class="text-red-600 text-xs mt-1 hidden"></span>
                    </div>
                    <div>
                        <button  onclick="validasi()" type="button" class="w-full px-6 py-2 bg-1 hover:bg-2 cursor-pointer text-white text-center rounded-lg shadow-md dark:bg-dark1">
                            Login
                        </button>
                    </div>
                </form>
                <div class="flex items-center my-8 w-full">
                    <div class="grow border-t border-gray-300 h-1"></div>
                    <span class="shrink mx-4 text-gray-400 text-xs font-semibold mb-1">Or Login With</span>
                    <div class="grow border-t border-gray-300 h-1"></div>
                </div>
                <button class="w-full py-3 bg-white hover:bg-gray-300 cursor-pointer rounded-lg shadow-md flex items-center justify-center gap-3">
                    <img src="Assets/icon_google.webp" alt="" class="w-6 h-6">
                    <span class="text-sm font-semibold">Sign in with Account Google</span>
                </button>
            </div>
        </div>
    </section>
    <script>
        function validasi() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (email==='' || pass===''){
                alert("Semua Data Harus Diisi!!!");
            }
            else if (pass.length < 6){
                alert("Password Harus lebih dari 6!!!");
            }
            else {
                alert("Login Berhasil! Selamat Datang.")
                window.location.href = "index.html";
            }
        }

    const halaman = document.documentElement;
    const tombol = document.getElementById('theme');
    const ikonBulan = document.getElementById('dark');
    const ikonSurya = document.getElementById('light');
    
    tombol.onclick = function() {
                
        halaman.classList.toggle('dark');

        ikonBulan.classList.toggle('hidden');
        ikonSurya.classList.toggle('hidden');
    };
    </script>
</body>
</html>
